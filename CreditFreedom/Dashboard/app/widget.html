<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dispute Submit Analytics</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>if (typeof $ === 'undefined') { window.$ = function(){}; window.jQuery = window.$; }</script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://live.zwidgets.com/js-sdk/1.0/ZohoEmbededAppSDK.min.js"></script>

    <style>
      :root {
        --bg: #f6f8fb;
        --card: rgba(255, 255, 255, 0.92);
        --card-strong: #ffffff;
        --ink: #111827;
        --muted: #667085;
        --border: rgba(148, 163, 184, 0.28);
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(246, 248, 251, 0.96)),
          var(--bg);
        color: var(--ink);
        font-family: "Space Grotesk", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.45;
      }

      button,
      input,
      select {
        font: inherit;
      }

      #root {
        min-height: 100vh;
      }

      .app-shell {
        width: min(100%, 1440px);
        margin: 0 auto;
        padding: 28px;
        display: grid;
        gap: 20px;
      }

      .status-grid {
        display: grid;
        gap: 16px;
      }

      .action-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(220px, 1fr));
        gap: 16px;
        align-items: stretch;
      }

      .action-card,
      .metric-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        animation: rise 0.6s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 104px;
      }

      .action-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 14px;
        color: var(--ink);
        line-height: 1.2;
      }

      .action-total {
        margin-top: 10px;
        font-size: 22px;
        font-weight: 600;
      }

      .action-sub { margin-top: 4px; font-size: 12px; color: var(--muted); }

      .metric-header {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.2;
      }

      .metric-label { flex: 1; }
      .metric-percent { font-weight: 600; }
      .metric-percent.info { color: #0284c7; }
      .metric-percent.success { color: #16a34a; }
      .metric-percent.danger { color: #dc2626; }

      .metric-value {
        margin-top: 8px;
        font-size: 20px;
        font-weight: 600;
        color: var(--ink);
      }

      .metric-bar {
        margin-top: 10px;
        height: 8px;
        background: rgba(148, 163, 184, 0.25);
        border-radius: 999px;
        position: relative;
        overflow: hidden;
      }

      .metric-bar span {
        position: absolute;
        inset: 0;
        width: calc(var(--value, 0) * 1%);
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.1)),
          var(--tone-color, #60a5fa);
        border-radius: 999px;
        animation: grow 1.2s ease;
      }

      .filters-card {
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        border-radius: 8px;
        padding: 18px 20px;
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
      }

      .filters-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }

      .filters-title { margin: 0; font-weight: 600; font-size: 16px; }
      .filters-sub { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

      .filters-actions { display: flex; gap: 10px; }

      .btn {
        border: 1px solid transparent;
        padding: 8px 16px;
        font-size: 13px;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn:active { transform: scale(0.98); }
      .btn.solid {
        background: #111827;
        color: #f8fafc;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.25);
      }
      .btn.ghost {
        background: rgba(255, 255, 255, 0.6);
        border-color: rgba(148, 163, 184, 0.4);
        color: #1f2937;
      }

      .filters-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 14px;
      }

      .field { display: grid; gap: 8px; font-size: 12px; color: var(--muted); }

      .field input,
      .field select {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        padding: 10px 12px;
        font-size: 14px;
        background: var(--card-strong);
        color: var(--ink);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(220px, 1fr));
        gap: 16px;
      }

      .stat-card {
        padding: 16px;
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        animation: rise 0.55s ease;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 96px;
      }

      .stat-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.6), transparent 50%);
        opacity: 0.7;
      }

      .stat-card > * { position: relative; z-index: 1; }

      .stat-left { display: inline-flex; gap: 12px; align-items: center; }

      .stat-icon {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.06);
        display: grid;
        place-items: center;
        color: var(--accent);
      }

      .stat-icon svg { width: 20px; height: 20px; fill: currentColor; }

      .stat-badge {
        width: 8px;
        height: 40px;
        border-radius: 999px;
        background: var(--accent);
      }

      .stat-title { margin: 0; font-size: 13px; color: var(--muted); }
      .stat-value { margin: 8px 0 4px; font-size: 26px; font-weight: 600; }
      .stat-sub { margin: 0; font-size: 12px; color: var(--muted); }

      .status-grid {
        display: grid;
        gap: 16px;
      }

      .status-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        animation: rise 0.6s ease;
      }

      .status-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .status-title {
        margin: 0;
        font-weight: 600;
        font-size: 15px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .status-total { margin: 4px 0 0; font-size: 12px; color: var(--muted); }

      .status-pulse {
        width: 46px;
        height: 46px;
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.12), rgba(15, 23, 42, 0.03));
      }

      .status-list { display: grid; gap: 10px; }

      .status-row {
        display: grid;
        grid-template-columns: auto 1fr 1fr auto;
        gap: 10px;
        align-items: center;
        font-size: 12px;
      }

      .status-meta { display: inline-flex; align-items: center; gap: 8px; min-width: 120px; }
      .status-label { color: var(--muted); }
      .status-value { font-weight: 600; font-size: 14px; }

      .status-bar {
        height: 8px;
        background: rgba(148, 163, 184, 0.25);
        border-radius: 999px;
        position: relative;
        overflow: hidden;
      }

      .status-bar span {
        position: absolute;
        inset: 0;
        width: calc(var(--value, 0) * 1%);
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.1)),
          var(--tone-color, #60a5fa);
        border-radius: 999px;
        animation: grow 1.2s ease;
      }

      .status-percent { color: var(--muted); font-size: 12px; }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .row-icon {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        color: #0f172a;
        background: rgba(15, 23, 42, 0.06);
      }

      .row-icon svg { width: 12px; height: 12px; fill: currentColor; }

      .row-icon.success { color: #166534; background: rgba(34, 197, 94, 0.12); }
      .row-icon.info { color: #0369a1; background: rgba(56, 189, 248, 0.15); }
      .row-icon.danger { color: #b91c1c; background: rgba(248, 113, 113, 0.18); }

      .group-icon {
        width: 24px;
        height: 24px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: rgba(15, 23, 42, 0.08);
        color: #0f172a;
      }

      .group-icon svg { width: 14px; height: 14px; fill: currentColor; }

      .dot.info { background: #38bdf8; }
      .dot.success { background: #34d399; }
      .dot.danger { background: #f87171; }

      .metric-bar.info { --tone-color: rgba(56, 189, 248, 0.9); }
      .metric-bar.success { --tone-color: rgba(34, 197, 94, 0.85); }
      .metric-bar.danger { --tone-color: rgba(248, 113, 113, 0.9); }

      .error-card {
        border-radius: 14px;
        padding: 14px 16px;
        background: rgba(254, 226, 226, 0.9);
        border: 1px solid rgba(248, 113, 113, 0.5);
        color: #991b1b;
      }

      .error-title { margin: 0; font-weight: 600; }
      .error-body { margin: 6px 0 0; font-size: 13px; }

      @keyframes rise {
        from { transform: translateY(10px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes grow {
        from { width: 0; }
        to { width: calc(var(--value, 0) * 1%); }
      }

      @media (max-width: 1100px) {
        .summary-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
        .action-row { grid-template-columns: repeat(2, minmax(240px, 1fr)); }
      }

      @media (max-width: 720px) {
        .summary-grid { grid-template-columns: 1fr; }
        .action-row { grid-template-columns: 1fr; }
      }

      @media (max-width: 900px) {
        .app-shell { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="./components/FilterBar.jsx"></script>
    <script type="text/babel" src="./components/StatCard.jsx"></script>
    <script type="text/babel" src="./components/StatusGroup.jsx"></script>
    <script type="text/babel" src="./main.jsx"></script>
  </body>
</html>
