<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispute Status</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- fallback: define $ if jQuery failed to load -->
  <script>if (typeof $ === 'undefined') { window.$ = function(){}; window.jQuery = window.$; }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://live.zwidgets.com/js-sdk/1.0/ZohoEmbededAppSDK.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html { margin: 0; padding: 0; min-height: 100%; }
    body {
      margin: 0;
      padding: 12px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 8%, rgba(14, 165, 233, 0.18), transparent 28rem),
        radial-gradient(circle at 88% 4%, rgba(59, 130, 246, 0.16), transparent 30rem),
        linear-gradient(135deg, #eef7ff 0%, #f8fbff 42%, #edf4f7 100%);
      background-attachment: fixed;
      font-family: Inter, system-ui, sans-serif;
      color: #111827;
    }
    #root { position: relative; z-index: 1; }

    .bg-white,
    .cf-glass,
    .cf-account-section {
      background: rgba(255, 255, 255, 0.62) !important;
      border-color: rgba(255, 255, 255, 0.55) !important;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10), inset 0 1px 0 rgba(255, 255, 255, 0.72) !important;
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
    }

    button.bg-white,
    input.bg-white,
    select.bg-white,
    [data-dropdown],
    .absolute.bg-white,
    .fixed.bg-white {
      background: rgba(255, 255, 255, 0.82) !important;
      border-color: rgba(148, 163, 184, 0.34) !important;
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
    }

    table,
    thead,
    tbody,
    tr,
    th,
    td {
      background-color: transparent;
    }

    .cf-glass-hero {
      background: linear-gradient(135deg, rgba(30, 58, 138, 0.78), rgba(29, 78, 216, 0.60), rgba(14, 165, 233, 0.42)) !important;
      border: 1px solid rgba(255, 255, 255, 0.36);
      box-shadow: 0 22px 50px rgba(30, 64, 175, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
    }

    .cf-glass-hero,
    .cf-glass,
    .cf-account-section {
      position: relative;
      overflow: hidden;
    }

    .cf-glass-hero::before,
    .cf-glass::before,
    .cf-account-section::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.42), transparent 42%);
      opacity: 0.55;
    }

    .cf-glass-hero > *,
    .cf-glass > *,
    .cf-account-section > * {
      position: relative;
      z-index: 1;
    }

    .cf-glass-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
    .cf-glass-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.26); border-radius: 999px; }
    .cf-glass-scroll::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.46); border: 2px solid rgba(255, 255, 255, 0.35); border-radius: 999px; }
    .cf-glass-scroll::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.58); }

    @media (min-width: 768px)  { body { padding: 16px; } }
    @media (min-width: 1024px) { body { padding: 20px; } }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel" src="./components/ActionButtonsBar.jsx"></script>
  <script type="text/babel" src="./components/ClientHeaderCard.jsx"></script>
  <script type="text/babel" src="./components/CreditScoresCard.jsx"></script>
  <script type="text/babel" src="./components/DisputeStatusTable.jsx"></script>
  <script type="text/babel" src="./components/AccountsDetailTable.jsx"></script>
  <script type="text/babel" src="./main.jsx"></script>

</body>
</html>
