<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Credentials</title>
   
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.__cfNativeAddEventListener = window.addEventListener;
    window.addEventListener = function (type, listener, options) {
      if (type === 'unload') return;
      return window.__cfNativeAddEventListener.call(this, type, listener, options);
    };
  </script>
  <script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
  <script>
    window.addEventListener = window.__cfNativeAddEventListener;
    delete window.__cfNativeAddEventListener;
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.82);
      --text: #141821;
      --muted: #5f6675;
      --border: rgba(27, 33, 48, 0.08);
      --shadow: 0 24px 60px rgba(24, 32, 46, 0.08);
    }
 
    * {
      box-sizing: border-box;
    }
 
    html,
    body,
    #root {
      min-height: 100%;
    }
 
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
 
    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: #edf1f6;
    }
 
    #root {
      position: relative;
      z-index: 1;
    }
 
    .app-shell {
      position: relative;
      padding: 24px;
      overflow: hidden;
      background: #edf1f6;
    }
 
    .page-title {
      font-family: Inter, system-ui, sans-serif;
      letter-spacing: 0;
    }
 
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
      width: min(100%, 440px);
      min-height: 48px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.64);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.82),
        0 12px 28px rgba(15, 23, 42, 0.07);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
    }
 
    .search-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      color: rgba(71, 85, 105, 0.86);
      flex: 0 0 auto;
    }
 
    .search-input {
      min-width: 0;
      flex: 1;
      border: 0;
      background: transparent;
      padding: 0 44px 0 0;
      color: rgba(15, 23, 42, 0.94);
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
    }
 
    .search-input::placeholder {
      color: rgba(100, 116, 139, 0.78);
      font-weight: 500;
    }
 
    .search-clear {
      position: absolute;
      right: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 9px;
      background: rgba(226, 232, 240, 0.72);
      color: rgba(51, 65, 85, 0.86);
    }
 
    .search-clear:hover {
      background: rgba(15, 23, 42, 0.92);
      color: #ffffff;
    }
 
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }
 
    .card {
      position: relative;
      min-height: 284px;
      border-radius: 12px;
      padding: 28px 28px 26px;
      border: 1px solid rgba(255, 255, 255, 0.56);
      box-shadow:
        0 22px 46px rgba(15, 23, 42, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
      overflow: hidden;
      transform: translateY(0) scale(1);
      transition:
        transform 220ms ease,
        box-shadow 220ms ease,
        border-color 220ms ease;
      will-change: transform;
    }
 
    .card:hover {
      transform: translateY(-6px) scale(1.012);
      border-color: rgba(255, 255, 255, 0.82);
      box-shadow:
        0 30px 64px rgba(15, 23, 42, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }
 
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.62), transparent 44%),
        linear-gradient(315deg, rgba(255, 255, 255, 0.26), transparent 52%);
      opacity: 0.78;
    }
 
    .card::after {
      content: "";
      position: absolute;
      inset: auto 18px 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.74);
    }
 
    .card-title {
      font-family: Inter, system-ui, sans-serif;
      letter-spacing: 0;
    }
 
    .card-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
 
    .title-icon,
    .detail-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: rgba(15, 23, 42, 0.72);
    }
 
    .title-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.52);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
    }
 
    .detail-row {
      display: grid;
      grid-template-columns: 144px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      padding: 8px 0;
    }
 
    .detail-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(20, 24, 33, 0.9);
      font-size: 0.95rem;
      line-height: 1.45;
    }
 
    .detail-value {
      font-size: 1rem;
      font-weight: 700;
      color: rgba(20, 24, 33, 0.92);
      word-break: break-word;
    }
 
    .detail-value-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
 
    .copy-field-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.62);
      color: rgba(51, 65, 85, 0.82);
      opacity: 0;
      pointer-events: none;
      transform: translateX(-4px) scale(0.94);
      transition:
        opacity 160ms ease,
        transform 160ms ease,
        background 160ms ease,
        color 160ms ease;
    }
 
    .detail-row:hover .copy-field-button,
    .card-title-row:hover .copy-field-button,
    .copy-field-button:focus-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
    }
 
    .title-copy-button {
      margin-left: 2px;
    }
 
    .copy-field-button:hover {
      background: rgba(15, 23, 42, 0.94);
      color: #ffffff;
    }
 
    .password-value {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0;
      font-variant-numeric: tabular-nums;
    }
 
    .password-char {
      display: inline-block;
      min-width: 0.62em;
      animation: passwordFlip 260ms ease both;
      transform-origin: center;
    }
 
    .note-value {
      display: flex;
      min-width: 0;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
 
    .note-text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
 
    .note-text.is-clamped {
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }
 
    .note-toggle {
      border: 0;
      padding: 0;
      background: transparent;
      color: #4f46e5;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.2;
    }
 
    .note-toggle:hover {
      color: #312e81;
      text-decoration: underline;
    }
 
    @keyframes passwordFlip {
      0% {
        opacity: 0;
        transform: translateY(-4px) rotateX(72deg);
      }
 
      100% {
        opacity: 1;
        transform: translateY(0) rotateX(0deg);
      }
    }
 
    .confirm-modal {
      width: min(100%, 420px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.92);
      padding: 24px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.24);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      animation: modalPop 180ms ease both;
    }
 
    .confirm-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      margin-bottom: 14px;
      border-radius: 14px;
      background: rgba(254, 226, 226, 0.95);
      color: #dc2626;
    }
 
    @keyframes modalPop {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.96);
      }
 
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
 
    @media (max-width: 640px) {
      .app-shell {
        padding: 16px;
      }
 
      .search-box {
        width: 100%;
      }
 
      .detail-row {
        grid-template-columns: 124px minmax(0, 1fr);
        gap: 10px;
      }
    }
 
    @media (max-width: 1100px) {
      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
 
    @media (max-width: 720px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
 
<body>
  <div id="root"></div>
  <script type="text/babel" src="./main.js"></script>
</body>
 
</html>
